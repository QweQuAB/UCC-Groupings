<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UCC BSc IT — Group Assignments</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ─── THEME TOKENS ─────────────────────────────────────────── */
[data-theme="dark"] {
  --bg: #0f0f0e;
  --bg2: #1a1a17;
  --surface: #1e1e1b;
  --surface2: #252521;
  --text: #e8e8e2;
  --text-sec: #8a8a82;
  --border: rgba(255,255,255,0.07);
  --border-med: rgba(255,255,255,0.13);
  --header-bg: #0a0f1e;
  --header-circuit: rgba(59,130,246,0.18);
  --header-node: rgba(96,165,250,0.5);
  --header-text: #f0f4ff;
  --header-sub: #93b4d4;
  --theme-icon: '☀';
}
[data-theme="light"] {
  --bg: #f4f3ef;
  --bg2: #eeece7;
  --surface: #ffffff;
  --surface2: #f9f8f5;
  --text: #181816;
  --text-sec: #72726c;
  --border: rgba(0,0,0,0.08);
  --border-med: rgba(0,0,0,0.15);
  --header-bg: #0d1b3e;
  --header-circuit: rgba(99,179,237,0.22);
  --header-node: rgba(147,210,255,0.6);
  --header-text: #f0f6ff;
  --header-sub: #a8cbe8;
  --theme-icon: '🌙';
}

/* ─── BASE ─────────────────────────────────────────────────── */
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: background 0.25s, color 0.25s; }
.page { max-width: 980px; margin: 0 auto; padding: 0 1rem 4rem; }

/* ─── HEADER BANNER ────────────────────────────────────────── */
.hero {
  background: var(--header-bg);
  padding: 2.5rem 2rem 2rem;
  margin: 0 -1rem 2rem;
  position: relative;
  overflow: hidden;
}
.hero-circuit {
  position: absolute; inset: 0; pointer-events: none;
}
.hero-content {
  position: relative; z-index: 2;
  display: flex; align-items: flex-start; justify-content: space-between; gap: 1.5rem; flex-wrap: wrap;
}
.hero-text h1 {
  font-size: 24px; font-weight: 700; letter-spacing: -0.5px;
  color: var(--header-text); line-height: 1.2;
}
.hero-text p { font-size: 13px; color: var(--header-sub); margin-top: 6px; }
.hero-badges { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
.hero-badge {
  font-size: 11px; padding: 3px 10px; border-radius: 99px;
  background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7);
  border: 0.5px solid rgba(255,255,255,0.15); letter-spacing: 0.3px;
}

/* ─── CLASSY ACTION BUTTONS ────────────────────────────────── */
.hero-actions { display: flex; gap: 10px; align-items: flex-start; flex-shrink: 0; }

.classy-btn {
  font-family: 'Segoe UI', system-ui, sans-serif;
  font-size: 13px; font-weight: 500;
  cursor: pointer; white-space: nowrap;
  display: inline-flex; align-items: center; gap: 8px;
  border-radius: 8px; padding: 9px 18px;
  transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
  position: relative; overflow: hidden;
}
.classy-btn::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 60%);
  pointer-events: none;
}
.classy-btn:hover { transform: translateY(-1px); }
.classy-btn:active { transform: translateY(0); }

.classy-btn-primary {
  background: linear-gradient(135deg, #1e3a8a 0%, #1d4ed8 100%);
  border: 0.5px solid rgba(147,197,253,0.3);
  color: #fff;
  box-shadow: 0 2px 12px rgba(29,78,216,0.4), inset 0 1px 0 rgba(255,255,255,0.15);
}
.classy-btn-primary:hover {
  box-shadow: 0 4px 20px rgba(29,78,216,0.55), inset 0 1px 0 rgba(255,255,255,0.2);
}
.classy-btn-secondary {
  background: rgba(255,255,255,0.06);
  border: 0.5px solid rgba(255,255,255,0.22);
  color: #e0eaff;
  box-shadow: 0 2px 8px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.08);
}
.classy-btn-secondary:hover {
  background: rgba(255,255,255,0.11);
  box-shadow: 0 4px 14px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.12);
}
.classy-btn-icon {
  width: 18px; height: 18px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-style: normal; line-height: 1;
}
.classy-btn-primary .classy-btn-icon { background: rgba(255,255,255,0.18); }
.classy-btn-secondary .classy-btn-icon { background: rgba(255,255,255,0.1); }

/* Theme toggle */
.theme-toggle {
  background: rgba(255,255,255,0.08); border: 0.5px solid rgba(255,255,255,0.18);
  border-radius: 8px; width: 36px; height: 36px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; color: #fff; transition: background 0.15s;
  flex-shrink: 0;
}
.theme-toggle:hover { background: rgba(255,255,255,0.15); }

/* ─── TABS ─────────────────────────────────────────────────── */
.tab-bar { display: flex; gap: 3px; overflow-x: auto; scrollbar-width: none; }
.tab-bar::-webkit-scrollbar { display: none; }
.tab {
  display: flex; align-items: center; gap: 6px; padding: 8px 14px;
  border-radius: 8px 8px 0 0; font-size: 13px; font-weight: 500; cursor: pointer;
  border: 0.5px solid transparent; border-bottom: none;
  background: transparent; color: var(--text-sec); white-space: nowrap;
  transition: background 0.12s, color 0.12s; position: relative; bottom: -1px;
  font-family: inherit;
}
.tab:hover { background: var(--surface); color: var(--text); }
.tab.active {
  background: var(--surface); color: var(--text);
  border-color: var(--border-med); border-bottom-color: var(--surface); z-index: 2;
}
.tab-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.tab-count { font-size: 11px; padding: 1px 7px; border-radius: 99px; font-weight: 600; }

/* ─── PANEL ────────────────────────────────────────────────── */
.panel-wrap {
  background: var(--surface); border: 0.5px solid var(--border-med);
  border-radius: 0 10px 10px 10px; overflow: hidden; position: relative; z-index: 1;
}
.panel { display: none; }
.panel.active { display: block; }

/* Topic bar */
.topic-bar {
  padding: 1rem 1.25rem; border-bottom: 0.5px solid rgba(255,255,255,0.1);
  display: flex; align-items: flex-start; gap: 12px;
}
.topic-icon {
  width: 40px; height: 40px; border-radius: 10px; font-size: 20px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.topic-info { flex: 1; min-width: 0; }
.topic-sup   { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; margin-bottom: 3px; }
.topic-title { font-size: 15px; font-weight: 600; line-height: 1.35; color: #fff; }
.topic-sub   { font-size: 12px; margin-top: 3px; opacity: 0.75; }
.topic-actions { flex-shrink: 0; }
.topic-btn {
  background: rgba(255,255,255,0.12); border: 0.5px solid rgba(255,255,255,0.25);
  color: #fff; border-radius: 7px; font-size: 12px; padding: 5px 12px;
  cursor: pointer; font-family: inherit; font-weight: 500;
  transition: background 0.12s;
}
.topic-btn:hover { background: rgba(255,255,255,0.22); }

/* Toolbar */
.toolbar {
  padding: 10px 1.25rem; border-bottom: 0.5px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.toolbar input {
  flex: 1; font-family: inherit; font-size: 13px; background: var(--bg2);
  color: var(--text); border: 0.5px solid var(--border-med); border-radius: 7px;
  padding: 7px 10px; outline: none; transition: border-color 0.15s;
}
.toolbar input:focus { border-color: #60a5fa; }
.s-count { font-size: 12px; color: var(--text-sec); white-space: nowrap; }

/* Inner add-student button */
.inner-add-btn {
  font-family: inherit; font-size: 12px; font-weight: 500;
  padding: 6px 13px; border-radius: 7px; cursor: pointer; white-space: nowrap;
  border: 0.5px solid var(--border-med); background: var(--surface2); color: var(--text);
  display: inline-flex; align-items: center; gap: 5px; transition: background 0.12s;
}
.inner-add-btn:hover { background: var(--bg2); }

/* Table */
.tbl-scroll { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 560px; }
thead tr { background: var(--bg2); }
th {
  padding: 9px 14px; text-align: left; font-size: 11px; font-weight: 500;
  color: var(--text-sec); text-transform: uppercase; letter-spacing: 0.4px;
  border-bottom: 0.5px solid var(--border); cursor: pointer; user-select: none; white-space: nowrap;
}
th:hover { color: var(--text); }
th.active { color: var(--text); }
th .si { margin-left: 2px; opacity: 0.35; }
th.active .si { opacity: 1; }
td { padding: 9px 14px; border-bottom: 0.5px solid var(--border); vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: var(--bg2); }
td.num   { color: var(--text-sec); font-size: 11px; width: 32px; }
td.idx   { font-family: 'Consolas','Courier New',monospace; font-size: 11.5px; color: var(--text-sec); }
td.phone { font-size: 12px; color: var(--text-sec); }
.av {
  display: inline-flex; align-items: center; justify-content: center;
  width: 28px; height: 28px; border-radius: 50%; font-size: 10px; font-weight: 700;
  margin-right: 8px; vertical-align: middle; flex-shrink: 0;
}
.btn-icon {
  padding: 5px 8px; font-size: 13px; border: none; background: transparent;
  color: var(--text-sec); cursor: pointer; border-radius: 6px; font-family: inherit;
}
.btn-icon:hover { background: var(--border); color: var(--text); }
.no-results { text-align: center; padding: 2.5rem; color: var(--text-sec); font-size: 13px; }

/* ─── MODAL ────────────────────────────────────────────────── */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.55); z-index: 100;
  align-items: center; justify-content: center; padding: 1rem;
  backdrop-filter: blur(2px);
}
.overlay.open { display: flex; }
.modal {
  background: var(--surface); border: 0.5px solid var(--border-med);
  border-radius: 14px; width: 100%; max-width: 480px; max-height: 90vh;
  overflow-y: auto; box-shadow: 0 24px 70px rgba(0,0,0,0.45);
}
.modal-header {
  padding: 1.1rem 1.25rem 0.8rem; border-bottom: 0.5px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-header h2 { font-size: 16px; font-weight: 600; }
.modal-close {
  background: none; border: none; font-size: 20px; color: var(--text-sec);
  cursor: pointer; padding: 2px 6px; border-radius: 4px; line-height: 1;
}
.modal-close:hover { background: var(--bg2); color: var(--text); }
.modal-body { padding: 1.25rem; display: flex; flex-direction: column; gap: 1rem; }
.modal-footer {
  padding: 0.9rem 1.25rem; border-top: 0.5px solid var(--border);
  display: flex; justify-content: flex-end; align-items: center; gap: 8px;
}
.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 11px; font-weight: 600; color: var(--text-sec); text-transform: uppercase; letter-spacing: 0.4px; }
.field input, .field textarea, .field select {
  font-family: inherit; font-size: 13px; background: var(--bg2); color: var(--text);
  border: 0.5px solid var(--border-med); border-radius: 7px; padding: 8px 10px; outline: none; width: 100%;
  transition: border-color 0.15s;
}
.field input:focus, .field textarea:focus { border-color: #60a5fa; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.btn { font-family: inherit; font-size: 13px; font-weight: 500; cursor: pointer; border-radius: 7px; padding: 7px 14px; border: 0.5px solid var(--border-med); background: var(--surface2); color: var(--text); display: inline-flex; align-items: center; gap: 6px; transition: background 0.12s; white-space: nowrap; }
.btn:hover { background: var(--bg2); }
.btn-primary { background: #1e40af; color: #fff; border-color: #1e40af; }
.btn-primary:hover { background: #1d3a9e; }
.btn-danger { background: #991b1b; color: #fff; border-color: #991b1b; }
.btn-danger:hover { background: #7f1d1d; }
.btn-sm { font-size: 12px; padding: 5px 10px; }

.color-presets { display: flex; gap: 7px; flex-wrap: wrap; }
.color-preset {
  width: 22px; height: 22px; border-radius: 50%; cursor: pointer;
  border: 2px solid transparent; transition: transform 0.1s, border-color 0.1s;
}
.color-preset:hover, .color-preset.sel { transform: scale(1.25); border-color: var(--text); }
.color-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
.color-row input[type=color] { width: 36px; height: 36px; padding: 2px; border-radius: 6px; cursor: pointer; border: 0.5px solid var(--border-med); background: none; }

.course-checks { display: flex; flex-wrap: wrap; gap: 8px; }
.course-check { display: flex; align-items: center; gap: 5px; font-size: 13px; cursor: pointer; }
.course-check input { cursor: pointer; accent-color: #2563eb; }

.del-zone { display: none; }
.del-zone.show { display: block; }
.del-box { background: #fef2f2; border: 0.5px solid #fca5a5; border-radius: 8px; padding: 0.75rem 1rem; font-size: 13px; color: #991b1b; }
[data-theme="dark"] .del-box { background: #3f1515; border-color: #7f1d1d; color: #fca5a5; }
.del-box-btns { display: flex; gap: 8px; margin-top: 10px; }
</style>
</head>
<body>
<div class="page">

  <!-- ── HERO HEADER ── -->
  <div class="hero" id="hero">
    <svg class="hero-circuit" id="circuitSvg" xmlns="http://www.w3.org/2000/svg"></svg>
    <div class="hero-content">
      <div class="hero-text">
        <h1>UCC Main Campus — BSc IT</h1>
        <p>Group presentation assignments · 2025</p>
        <div class="hero-badges">
          <span class="hero-badge">University of Cape Coast</span>
          <span class="hero-badge">5 Courses</span>
          <span class="hero-badge">19 Students</span>
        </div>
      </div>
      <div class="hero-actions">
        <button class="classy-btn classy-btn-primary" onclick="openAddStudentModal()">
          <span class="classy-btn-icon">+</span> Add Student
        </button>
        <button class="classy-btn classy-btn-secondary" onclick="openAddCourseModal()">
          <span class="classy-btn-icon">+</span> Add Course
        </button>
        <button class="theme-toggle" id="themeToggle" title="Toggle theme" onclick="toggleTheme()">☀</button>
      </div>
    </div>
  </div>

  <div class="tab-bar" id="tabBar"></div>
  <div class="panel-wrap" id="panelWrap"></div>
</div>

<!-- Edit Topic Modal -->
<div class="overlay" id="topicModal">
  <div class="modal">
    <div class="modal-header">
      <h2>Edit course topic</h2>
      <button class="modal-close" onclick="closeModal('topicModal')">×</button>
    </div>
    <div class="modal-body">
      <div class="field"><label>Course label (tab name)</label><input id="et-label" type="text"></div>
      <div class="field-row">
        <div class="field"><label>Group</label><input id="et-group" type="text" placeholder="e.g. Group 4"></div>
        <div class="field"><label>Icon (emoji)</label><input id="et-icon" type="text" maxlength="2" placeholder="✉️"></div>
      </div>
      <div class="field"><label>Unit / Section line</label><input id="et-sup" type="text"></div>
      <div class="field"><label>Topic title</label><input id="et-title" type="text"></div>
      <div class="field"><label>Topic subtitle (optional)</label><input id="et-sub" type="text"></div>
      <div class="field">
        <label>Accent colour</label>
        <div class="color-presets" id="colorPresets"></div>
        <div class="color-row"><input type="color" id="et-color"><span style="font-size:12px;color:var(--text-sec);">Or pick custom</span></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('topicModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveTopicEdit()">Save changes</button>
    </div>
  </div>
</div>

<!-- Edit/Add Student Modal -->
<div class="overlay" id="studentModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="sm-title">Edit student</h2>
      <button class="modal-close" onclick="closeModal('studentModal')">×</button>
    </div>
    <div class="modal-body">
      <div class="field"><label>Full name</label><input id="es-name" type="text"></div>
      <div class="field-row">
        <div class="field"><label>Index number</label><input id="es-idx" type="text" style="font-family:'Consolas',monospace;font-size:12px;"></div>
        <div class="field"><label>Phone</label><input id="es-phone" type="text"></div>
      </div>
      <div class="field"><label>Enrolled courses</label><div class="course-checks" id="es-courses"></div></div>
      <div class="del-zone" id="del-confirm">
        <div class="del-box">
          Are you sure you want to remove this student?
          <div class="del-box-btns">
            <button class="btn btn-danger btn-sm" onclick="confirmDeleteStudent()">Yes, remove</button>
            <button class="btn btn-sm" onclick="document.getElementById('del-confirm').classList.remove('show')">Cancel</button>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-sm" style="color:#dc2626;border-color:#fca5a5;" onclick="document.getElementById('del-confirm').classList.toggle('show')">Remove</button>
      <div style="flex:1;"></div>
      <button class="btn" onclick="closeModal('studentModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveStudentEdit()">Save changes</button>
    </div>
  </div>
</div>

<!-- Add Course Modal -->
<div class="overlay" id="addCourseModal">
  <div class="modal">
    <div class="modal-header">
      <h2>Add new course</h2>
      <button class="modal-close" onclick="closeModal('addCourseModal')">×</button>
    </div>
    <div class="modal-body">
      <div class="field"><label>Course label (tab name)</label><input id="ac-label" type="text" placeholder="e.g. Cybersecurity"></div>
      <div class="field-row">
        <div class="field"><label>Group</label><input id="ac-group" type="text" placeholder="e.g. Group 5"></div>
        <div class="field"><label>Icon (emoji)</label><input id="ac-icon" type="text" maxlength="2" placeholder="🔒"></div>
      </div>
      <div class="field"><label>Unit / Section line</label><input id="ac-sup" type="text"></div>
      <div class="field"><label>Topic title</label><input id="ac-title" type="text"></div>
      <div class="field"><label>Topic subtitle (optional)</label><input id="ac-sub" type="text"></div>
      <div class="field">
        <label>Accent colour</label>
        <div class="color-presets" id="acColorPresets"></div>
        <div class="color-row"><input type="color" id="ac-color" value="#be185d"><span style="font-size:12px;color:var(--text-sec);">Or pick custom</span></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('addCourseModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveNewCourse()">Add course</button>
    </div>
  </div>
</div>

<script>
/* ─── CIRCUIT BOARD SVG ──────────────────────────────────── */
function drawCircuit() {
  const hero = document.getElementById('hero');
  const svg  = document.getElementById('circuitSvg');
  const W = hero.offsetWidth, H = hero.offsetHeight || 160;
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('width', W); svg.setAttribute('height', H);

  const theme = document.documentElement.getAttribute('data-theme');
  const lineColor = theme === 'dark' ? 'rgba(59,130,246,0.18)' : 'rgba(99,179,237,0.2)';
  const nodeColor = theme === 'dark' ? 'rgba(96,165,250,0.5)'  : 'rgba(147,210,255,0.6)';
  const dotColor  = theme === 'dark' ? 'rgba(147,197,253,0.7)' : 'rgba(186,230,255,0.8)';

  // Seeded "random" for stable layout
  let seed = 42;
  const rand = () => { seed = (seed * 16807 + 0) % 2147483647; return (seed - 1) / 2147483646; };

  const GRID = 40;
  const cols = Math.ceil(W / GRID) + 1;
  const rows = Math.ceil(H / GRID) + 1;
  let html = '';

  // Horizontal and vertical traces
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const x = c * GRID, y = r * GRID;
      if (rand() > 0.55) {
        const len = (Math.floor(rand() * 3) + 1) * GRID;
        html += `<line x1="${x}" y1="${y}" x2="${Math.min(x+len,W)}" y2="${y}" stroke="${lineColor}" stroke-width="1"/>`;
      }
      if (rand() > 0.6) {
        const len = (Math.floor(rand() * 2) + 1) * GRID;
        html += `<line x1="${x}" y1="${y}" x2="${x}" y2="${Math.min(y+len,H)}" stroke="${lineColor}" stroke-width="1"/>`;
      }
    }
  }

  // Nodes (circles at grid intersections)
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (rand() > 0.72) {
        const x = c * GRID, y = r * GRID;
        const big = rand() > 0.8;
        if (big) {
          html += `<circle cx="${x}" cy="${y}" r="5" fill="none" stroke="${nodeColor}" stroke-width="1.2"/>`;
          html += `<circle cx="${x}" cy="${y}" r="2" fill="${dotColor}"/>`;
        } else {
          html += `<circle cx="${x}" cy="${y}" r="2.5" fill="${nodeColor}"/>`;
        }
      }
    }
  }

  // IC chip rectangles
  for (let i = 0; i < 4; i++) {
    const x = Math.floor(rand() * (W - 60)) + 10;
    const y = Math.floor(rand() * (H - 30)) + 5;
    const w = Math.floor(rand() * 40) + 30;
    const h = Math.floor(rand() * 16) + 12;
    html += `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="3" fill="none" stroke="${nodeColor}" stroke-width="0.8"/>`;
  }

  svg.innerHTML = html;
}

/* ─── THEME ──────────────────────────────────────────────── */
function toggleTheme() {
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  document.getElementById('themeToggle').textContent = next === 'dark' ? '☀' : '🌙';
  drawCircuit();
}

/* ─── COLOUR HELPERS ─────────────────────────────────────── */
const PRESETS = ['#1e40af','#064e3b','#78350f','#4c1d95','#164e63','#9d174d','#7f1d1d','#1e3a5f','#365314','#431407'];

function darken(hex, amt) {
  let [r,g,b] = [1,3,5].map(i => Math.max(0, parseInt(hex.slice(i,i+2),16) - amt));
  return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
}
function lighten(hex, pct) {
  let [r,g,b] = [1,3,5].map(i => Math.min(255, Math.round(parseInt(hex.slice(i,i+2),16) + (255-parseInt(hex.slice(i,i+2),16))*pct)));
  return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
}
function courseColors(acc) {
  return { tabBg: darken(acc,20), iconBg: lighten(acc,0.2), tabText: lighten(acc,0.7) };
}
function initials(n) {
  const p = n.trim().split(/\s+/);
  return (p[0][0]+(p[p.length-1][0]||'')).toUpperCase();
}

function buildPresets(cid, iid) {
  const w = document.getElementById(cid); w.innerHTML = '';
  PRESETS.forEach(col => {
    const d = document.createElement('div');
    d.className = 'color-preset'; d.style.background = col; d.title = col;
    d.onclick = () => { document.getElementById(iid).value = col; w.querySelectorAll('.color-preset').forEach(x=>x.classList.remove('sel')); d.classList.add('sel'); };
    w.appendChild(d);
  });
}

/* ─── RENDER ─────────────────────────────────────────────── */
function renderAll() {
  const prev = activeCourseId;
  const tabBar = document.getElementById('tabBar');
  const panelWrap = document.getElementById('panelWrap');
  tabBar.innerHTML = ''; panelWrap.innerHTML = '';

  COURSES.forEach((c, i) => {
    if (!sortState[c.id]) sortState[c.id] = {key:'name', dir:1};
    const cols  = courseColors(c.accent);
    const count = STUDENTS.filter(s => s.courses.includes(c.id)).length;
    const on    = prev ? c.id === prev : i === 0;

    const btn = document.createElement('button');
    btn.className = 'tab' + (on?' active':'');
    btn.id = 'tab-'+c.id;
    btn.onclick = () => switchTab(c.id);
    btn.innerHTML = `<span class="tab-dot" style="background:${c.accent};"></span>${c.label}<span class="tab-count" style="background:${cols.tabBg};color:${cols.tabText};">${count}</span>`;
    tabBar.appendChild(btn);

    const pnl = document.createElement('div');
    pnl.className = 'panel'+(on?' active':'');
    pnl.id = 'pnl-'+c.id;
    pnl.innerHTML = `
      <div class="topic-bar" style="background:${cols.tabBg};">
        <div class="topic-icon" style="background:${cols.iconBg};color:#fff;">${c.icon}</div>
        <div class="topic-info">
          <div class="topic-sup" style="color:${cols.tabText};">${c.topicSup||'—'}</div>
          <div class="topic-title">${c.topicTitle||'No topic set'}</div>
          ${c.topicSub?`<div class="topic-sub" style="color:${cols.tabText};">${c.topicSub}</div>`:''}
        </div>
        <div class="topic-actions">
          <button class="topic-btn" onclick="openTopicEdit('${c.id}')">✏ Edit topic</button>
        </div>
      </div>
      <div class="toolbar">
        <input type="text" id="q-${c.id}" placeholder="Search students…" oninput="renderTable('${c.id}')">
        <span class="s-count" id="cnt-${c.id}"></span>
        <button class="inner-add-btn" onclick="openAddStudentModal('${c.id}')">+ Add student</button>
      </div>
      <div class="tbl-scroll">
        <table>
          <thead><tr>
            <th style="width:32px;">#</th>
            <th id="th-${c.id}-name" class="active" onclick="sortTable('${c.id}','name')">Name <span class="si">↑</span></th>
            <th id="th-${c.id}-idx" onclick="sortTable('${c.id}','idx')">Index number <span class="si">↕</span></th>
            <th id="th-${c.id}-phone" onclick="sortTable('${c.id}','phone')">Phone <span class="si">↕</span></th>
            <th style="width:48px;"></th>
          </tr></thead>
          <tbody id="tb-${c.id}"></tbody>
        </table>
      </div>`;
    panelWrap.appendChild(pnl);
    renderTable(c.id);
  });
  if (!activeCourseId) activeCourseId = COURSES[0]?.id;
  // update hero badge count
  document.querySelectorAll('.hero-badge')[2].textContent = STUDENTS.length+' Students';
  document.querySelectorAll('.hero-badge')[1].textContent = COURSES.length+' Courses';
}

function renderTable(cid) {
  const c = COURSES.find(x=>x.id===cid); if (!c) return;
  const cols = courseColors(c.accent);
  const q = (document.getElementById('q-'+cid)?.value||'').toLowerCase().trim();
  const ss = sortState[cid]||{key:'name',dir:1};
  let rows = STUDENTS.filter(s=>s.courses.includes(cid));
  const total = rows.length;
  if (q) rows = rows.filter(s=>s.name.toLowerCase().includes(q)||s.idx.toLowerCase().includes(q)||s.phone.includes(q));
  rows.sort((a,b)=>{const av=(a[ss.key]||'').toLowerCase(),bv=(b[ss.key]||'').toLowerCase();return av<bv?-ss.dir:av>bv?ss.dir:0;});
  const cntEl = document.getElementById('cnt-'+cid);
  if (cntEl) cntEl.textContent = q?`${rows.length} of ${total}`:`${total} students`;
  const tbody = document.getElementById('tb-'+cid); if (!tbody) return;
  if (!rows.length){tbody.innerHTML='<tr><td colspan="5" class="no-results">No students match.</td></tr>';return;}
  tbody.innerHTML = rows.map((s,i)=>`
    <tr>
      <td class="num">${i+1}</td>
      <td><span class="av" style="background:${cols.iconBg};color:#fff;">${initials(s.name)}</span><span style="font-weight:500;">${s.name}</span></td>
      <td class="idx">${s.idx}</td>
      <td class="phone">${s.phone}</td>
      <td><button class="btn-icon" onclick="openStudentEdit(${s.id})">✏</button></td>
    </tr>`).join('');
}

function sortTable(cid, key) {
  const ss = sortState[cid];
  ss.dir = ss.key===key?ss.dir*-1:1; ss.key=key;
  ['name','idx','phone'].forEach(k=>{
    const th=document.getElementById(`th-${cid}-${k}`); if(!th) return;
    th.classList.toggle('active',k===key);
    th.querySelector('.si').textContent=k===key?(ss.dir===1?'↑':'↓'):'↕';
  });
  renderTable(cid);
}

function switchTab(cid) {
  activeCourseId = cid;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+cid).classList.add('active');
  document.getElementById('pnl-'+cid).classList.add('active');
}

/* ─── MODALS ─────────────────────────────────────────────── */
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  document.getElementById('del-confirm').classList.remove('show');
}

function openTopicEdit(cid) {
  editCourseId = cid;
  const c = COURSES.find(x=>x.id===cid);
  document.getElementById('et-label').value = c.label;
  document.getElementById('et-group').value = c.group;
  document.getElementById('et-icon').value  = c.icon;
  document.getElementById('et-sup').value   = c.topicSup;
  document.getElementById('et-title').value = c.topicTitle;
  document.getElementById('et-sub').value   = c.topicSub;
  document.getElementById('et-color').value = c.accent;
  buildPresets('colorPresets','et-color');
  document.getElementById('topicModal').classList.add('open');
}

function saveTopicEdit() {
  const c = COURSES.find(x=>x.id===editCourseId);
  c.label      = document.getElementById('et-label').value.trim()||c.label;
  c.group      = document.getElementById('et-group').value.trim();
  c.icon       = document.getElementById('et-icon').value.trim()||c.icon;
  c.topicSup   = document.getElementById('et-sup').value.trim();
  c.topicTitle = document.getElementById('et-title').value.trim();
  c.topicSub   = document.getElementById('et-sub').value.trim();
  c.accent     = document.getElementById('et-color').value;
  closeModal('topicModal'); renderAll();
}

function buildCourseChecks(cid, sel) {
  const w = document.getElementById(cid); w.innerHTML = '';
  COURSES.forEach(c=>{
    const lbl = document.createElement('label'); lbl.className='course-check';
    const chk = document.createElement('input'); chk.type='checkbox'; chk.value=c.id; chk.checked=sel.includes(c.id);
    lbl.appendChild(chk); lbl.appendChild(document.createTextNode(c.label)); w.appendChild(lbl);
  });
}

function openStudentEdit(sid) {
  editStudentId = sid;
  const s = STUDENTS.find(x=>x.id===sid);
  document.getElementById('sm-title').textContent = 'Edit student';
  document.getElementById('es-name').value  = s.name;
  document.getElementById('es-idx').value   = s.idx;
  document.getElementById('es-phone').value = s.phone==='—'?'':s.phone;
  buildCourseChecks('es-courses', s.courses);
  document.getElementById('del-confirm').classList.remove('show');
  document.getElementById('studentModal').classList.add('open');
}

function openAddStudentModal(pre) {
  editStudentId = null;
  document.getElementById('sm-title').textContent = 'Add student';
  document.getElementById('es-name').value = '';
  document.getElementById('es-idx').value  = '';
  document.getElementById('es-phone').value= '';
  buildCourseChecks('es-courses', pre?[pre]:[]);
  document.getElementById('del-confirm').classList.remove('show');
  document.getElementById('studentModal').classList.add('open');
}

function saveStudentEdit() {
  const name   = document.getElementById('es-name').value.trim(); if(!name){document.getElementById('es-name').focus();return;}
  const idx    = document.getElementById('es-idx').value.trim();
  const phone  = document.getElementById('es-phone').value.trim()||'—';
  const courses= [...document.querySelectorAll('#es-courses input:checked')].map(x=>x.value);
  if (editStudentId) { const s=STUDENTS.find(x=>x.id===editStudentId); s.name=name;s.idx=idx;s.phone=phone;s.courses=courses; }
  else STUDENTS.push({id:nextId++,name,idx,phone,courses});
  closeModal('studentModal');
  COURSES.forEach(c=>renderTable(c.id));
  COURSES.forEach(c=>{const b=document.querySelector(`#tab-${c.id} .tab-count`);if(b)b.textContent=STUDENTS.filter(s=>s.courses.includes(c.id)).length;});
  document.querySelectorAll('.hero-badge')[2].textContent=STUDENTS.length+' Students';
}

function confirmDeleteStudent() {
  STUDENTS = STUDENTS.filter(s=>s.id!==editStudentId);
  closeModal('studentModal');
  COURSES.forEach(c=>renderTable(c.id));
  COURSES.forEach(c=>{const b=document.querySelector(`#tab-${c.id} .tab-count`);if(b)b.textContent=STUDENTS.filter(s=>s.courses.includes(c.id)).length;});
  document.querySelectorAll('.hero-badge')[2].textContent=STUDENTS.length+' Students';
}

function openAddCourseModal() {
  ['ac-label','ac-group','ac-icon','ac-sup','ac-title','ac-sub'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('ac-color').value = PRESETS[nextCI%PRESETS.length];
  buildPresets('acColorPresets','ac-color');
  document.getElementById('addCourseModal').classList.add('open');
}

function saveNewCourse() {
  const label = document.getElementById('ac-label').value.trim(); if(!label){document.getElementById('ac-label').focus();return;}
  const id = 'c'+Date.now();
  COURSES.push({id, label, group:document.getElementById('ac-group').value.trim(), accent:document.getElementById('ac-color').value, icon:document.getElementById('ac-icon').value.trim()||'📚', topicSup:document.getElementById('ac-sup').value.trim(), topicTitle:document.getElementById('ac-title').value.trim()||'Topic not yet specified', topicSub:document.getElementById('ac-sub').value.trim()});
  sortState[id]={key:'name',dir:1}; nextCI++;
  closeModal('addCourseModal'); renderAll(); switchTab(id);
  document.querySelectorAll('.hero-badge')[1].textContent=COURSES.length+' Courses';
}
